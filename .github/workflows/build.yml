name: Build TERRARIO.g1a

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: manawyrm/fxsdk:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build TERRARIO.g1a
        run: |
          export PATH="$PATH:/root/.local/bin"
          mkdir -p build-fx
          make all-fx

      - name: Upload TERRARIO.g1a
        uses: actions/upload-artifact@v4
        with:
          name: TERRARIO-SH3
          path: TERRARIO.g1a
