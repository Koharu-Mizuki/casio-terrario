name: Build TERRARIO.g1a

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: manawyrm/fxsdk:latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug env
        run: |
          export PATH="$PATH:/root/.local/bin"
          echo "=== PATH ===" && echo $PATH
          echo "=== sh-elf-gcc ===" && which sh-elf-gcc && sh-elf-gcc --version
          echo "=== make ===" && make --version | head -1

      - name: Build
        run: |
          export PATH="$PATH:/root/.local/bin"
          mkdir -p build-fx
          make all-fx 2>&1

      - name: Upload TERRARIO.g1a
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TERRARIO-SH3
          path: TERRARIO.g1a
